<div id="header-status"
     hx-trigger="none"
     hx-swap="outerHTML">
  <div class="header-status">
    <span class="status-dot {{ 'on' if status.running else 'off' }}"></span>
    <span class="status-info">
      {% if status.running %}
        PID:{{ status.pid }} · {{ status.mailbox }} · {{ status.ai }} · {{ status.mode.upper() }}
      {% else %}{{ t.status_stopped }}{% endif %}
    </span>
  </div>
  <div class="header-actions">
    <!-- Run / Play -->
    <button class="header-btn icon run" title="{{ t.btn_start }}" hx-post="/daemon/start" hx-target="#header-status" hx-swap="outerHTML" {% if status.running %}disabled{% endif %}>
      <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
    </button>
    <!-- Stop -->
    <button class="header-btn icon stop" title="{{ t.btn_stop }}" hx-post="/daemon/stop" hx-target="#header-status" hx-swap="outerHTML" {% if not status.running %}disabled{% endif %}>
      <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><rect x="5" y="5" width="14" height="14"/></svg>
    </button>
    <!-- Restart -->
    <button class="header-btn icon" title="{{ t.btn_restart }}" hx-post="/daemon/restart" hx-target="#header-status" hx-swap="outerHTML" {% if not status.running %}disabled{% endif %}>
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/>
      </svg>
    </button>
  </div>
  {% if message %}
  <div class="hs-msg {{ 'ok' if success else 'er' }}">{{ message }}</div>
  {% endif %}
</div>
